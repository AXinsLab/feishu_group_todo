services:
  feishu-todo-agent:
    build: .
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # SQLite Checkpointer 数据持久化
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
